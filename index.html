<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Golf Gym Tracker</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#238636;--green-bright:#2ea043;--red:#da3633;--blue:#58a6ff;--orange:#d29922;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:500px;margin:0 auto;padding:12px}
h1{font-size:1.3rem;text-align:center;padding:16px 0 4px;color:var(--blue)}
.subtitle{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:12px}
.nav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.nav button{flex:1;padding:10px 6px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;font-size:.82rem;cursor:pointer;min-width:60px;transition:all .15s}
.nav button.active{background:var(--green);border-color:var(--green-bright);font-weight:600}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:.9rem;cursor:pointer}
.week-nav button:disabled{opacity:.3}
.week-label{font-size:1rem;font-weight:600;color:var(--orange)}
.phase-label{text-align:center;color:var(--purple);font-size:.75rem;margin-bottom:10px;font-weight:600}
.exercise{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.exercise-name{font-weight:600;font-size:.95rem;margin-bottom:2px;color:var(--blue)}
.exercise-detail{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.sets-grid{display:flex;flex-direction:column;gap:6px}
.set-row{display:flex;align-items:center;gap:8px}
.set-label{font-size:.78rem;color:var(--muted);width:38px;flex-shrink:0}
.weight-input{width:64px;padding:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:.9rem;text-align:center;-webkit-appearance:none}
.weight-input:focus{border-color:var(--blue);outline:none}
.reps-display{font-size:.8rem;color:var(--muted);width:50px;text-align:center}
.set-check{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.set-check.done{background:var(--green);border-color:var(--green-bright);color:#fff}
.section-title{font-size:.85rem;font-weight:600;color:var(--orange);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cardio-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.cardio-box .exercise-name{color:var(--orange)}
.cardio-detail{font-size:.85rem;color:var(--text);line-height:1.5}
.progress-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.progress-text{font-size:.78rem;color:var(--muted);margin-bottom:6px}
.progress-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.reset-btn{display:block;margin:20px auto;padding:10px 24px;background:var(--red);border:none;color:#fff;border-radius:8px;font-size:.85rem;cursor:pointer;opacity:.7}
.activation-tag{font-size:.65rem;background:var(--purple);color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.kg-label{font-size:.75rem;color:var(--muted)}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const WEEKS=[
{week:1,phase:"Hypertrophy Base",sets:3,reps:12,intensity:"65%",deload:false},
{week:2,phase:"Hypertrophy Base",sets:3,reps:12,intensity:"67%",deload:false},
{week:3,phase:"Hypertrophy Build",sets:3,reps:10,intensity:"72%",deload:false},
{week:4,phase:"Hypertrophy Build",sets:3,reps:10,intensity:"75%",deload:false},
{week:5,phase:"Strength",sets:4,reps:8,intensity:"78%",deload:false},
{week:6,phase:"Strength",sets:4,reps:8,intensity:"80%",deload:false},
{week:7,phase:"Peak Strength",sets:4,reps:6,intensity:"85%",deload:false},
{week:8,phase:"Deload & Test",sets:3,reps:8,intensity:"60%",deload:true}
];
const STARTING_WEIGHTS={squat:100,deadlift:120,overhead_press:50,db_chest_press:30,goblet_squat:28,db_row:28,hip_thrust:60,cable_woodchop:15,pallof_press:10,lat_pulldown:50,face_pull:15,leg_curl:30,lateral_raise:10,tricep_pushdown:20,bicep_curl:14,calf_raise:40,leg_press:120,chest_fly:12,rear_delt_fly:8};
const SKI_ERG=["6 x 30s hard / 90s easy","6 x 30s hard / 90s easy","5 x 45s hard / 75s easy","5 x 45s hard / 75s easy","4 x 60s hard / 60s easy","4 x 60s hard / 60s easy","3 x 90s hard / 90s easy","20 min steady \u2014 uncomfortable pace"];
const ACTIVATION=[{name:"Glute Bridges",detail:"2 \u00d7 15 \u2014 bodyweight, squeeze at top"},{name:"Band Pull-Aparts",detail:"2 \u00d7 15 \u2014 light band, focus on scapular retraction"},{name:"Cat-Cow + T-Spine Rotation",detail:"1 min each \u2014 slow and controlled"},{name:"Band Walks",detail:"2 \u00d7 10 each direction \u2014 maintain tension"}];
function getDayExercises(day,week){var w=WEEKS[week],s=w.sets,r=w.reps;var exercises={A:[{name:"Back Squat",sets:s,reps:r,key:"squat",compound:true},{name:"DB Chest Press",sets:s,reps:r,key:"db_chest_press",compound:true},{name:"Cable Woodchop",sets:3,reps:12,key:"cable_woodchop",compound:false},{name:"Lat Pulldown",sets:s,reps:r,key:"lat_pulldown",compound:true},{name:"Face Pull",sets:3,reps:15,key:"face_pull",compound:false},{name:"Pallof Press",sets:3,reps:"10 each side",key:"pallof_press",compound:false}],B:[{name:"Deadlift",sets:s,reps:Math.max(r-2,4),key:"deadlift",compound:true},{name:"Overhead Press",sets:s,reps:r,key:"overhead_press",compound:true},{name:"DB Row",sets:s,reps:r,key:"db_row",compound:true},{name:"Hip Thrust",sets:s,reps:r,key:"hip_thrust",compound:true},{name:"Lateral Raise",sets:3,reps:15,key:"lateral_raise",compound:false},{name:"Leg Curl",sets:3,reps:12,key:"leg_curl",compound:false}],C:[{name:"Goblet Squat",sets:s,reps:r,key:"goblet_squat",compound:true},{name:"Leg Press",sets:s,reps:r,key:"leg_press",compound:true},{name:"Chest Fly",sets:3,reps:12,key:"chest_fly",compound:false},{name:"Rear Delt Fly",sets:3,reps:15,key:"rear_delt_fly",compound:false},{name:"Tricep Pushdown",sets:3,reps:12,key:"tricep_pushdown",compound:false},{name:"Bicep Curl",sets:3,reps:12,key:"bicep_curl",compound:false},{name:"Calf Raise",sets:3,reps:15,key:"calf_raise",compound:false}]};return exercises[day];}
function calcWeight(base,week,compound){var w=WEEKS[week];if(w.deload)return Math.round(base*0.85/2.5)*2.5;var basePct=0.65;var curPct=parseFloat(w.intensity)/100;var multiplier=curPct/basePct;if(compound)return Math.round(base*multiplier/2.5)*2.5;return Math.round(base*multiplier/2)*2;}
let state=JSON.parse(localStorage.getItem('ggt_state')||'null')||{week:0,day:'A',log:{},version:3};
function save(){localStorage.setItem('ggt_state',JSON.stringify(state))}
function logKey(w,d,e,s){return w+'_'+d+'_'+e+'_'+s}
function weightKey(w,d,e){return 'w_'+w+'_'+d+'_'+e}
function toggleSet(w,d,e,s){var k=logKey(w,d,e,s);state.log[k]=!state.log[k];save();render();}
function updateWeight(w,d,e,v){state.log[weightKey(w,d,e)]=v;save();}
function getWeight(w,d,e,def){var k=weightKey(w,d,e);return state.log[k]!==undefined?state.log[k]:def;}
function getProgress(week,day){var exs=getDayExercises(day,week);var total=0,done=0;exs.forEach(function(ex,ei){for(var si=0;si<ex.sets;si++){total++;if(state.log[logKey(week,day,ei,si)])done++;}});return{total:total,done:done,pct:total?Math.round(done/total*100):0};}
function render(){var app=document.getElementById('app');var w=WEEKS[state.week];var exs=getDayExercises(state.day,state.week);var prog=getProgress(state.week,state.day);
var html='<h1>Golf Gym Tracker</h1>';
html+='<div class="subtitle">Schoolhouse Gym \u2014 Hog Hill, Ballymena</div>';
html+='<div class="week-nav">';
html+='<button onclick="if(state.week>0){state.week--;save();render()}" '+(state.week===0?'disabled':'')+'>\u25c0</button>';
html+='<span class="week-label">Week '+w.week+' of 8</span>';
html+='<button onclick="if(state.week<7){state.week++;save();render()}" '+(state.week===7?'disabled':'')+'>\u25b6</button>';
html+='</div>';
html+='<div class="phase-label">'+w.phase+' \u2014 '+w.sets+'\u00d7'+w.reps+' @ '+w.intensity+(w.deload?' \ud83d\udd04 DELOAD':'')+'</div>';
html+='<div class="nav">';
html+='<button class="'+(state.day==="A"?"active":"")+'" onclick="state.day=\'A\';save();render()">Day A<br><small>Squat+Push</small></button>';
html+='<button class="'+(state.day==="B"?"active":"")+'" onclick="state.day=\'B\';save();render()">Day B<br><small>Dead+Press</small></button>';
html+='<button class="'+(state.day==="C"?"active":"")+'" onclick="state.day=\'C\';save();render()">Day C<br><small>Legs+Arms</small></button>';
html+='</div>';
html+='<div class="progress-bar"><div class="progress-text">Today: '+prog.done+'/'+prog.total+' sets ('+prog.pct+'%)</div><div class="progress-track"><div class="progress-fill" style="width:'+prog.pct+'%"></div></div></div>';
html+='<div class="section-title">Activation (5 min)</div>';
ACTIVATION.forEach(function(a){html+='<div class="exercise"><div class="exercise-name">'+a.name+'<span class="activation-tag">ACTIVATION</span></div><div class="exercise-detail">'+a.detail+'</div></div>';});
html+='<div class="section-title">Main Lifts</div>';
exs.forEach(function(ex,ei){var defW=calcWeight(STARTING_WEIGHTS[ex.key]||20,state.week,ex.compound);var curW=getWeight(state.week,state.day,ei,defW);html+='<div class="exercise"><div class="exercise-name">'+ex.name+'</div><div class="exercise-detail">'+ex.sets+' sets \u00d7 '+ex.reps+' reps \u2014 suggested '+defW+'kg</div><div class="sets-grid">';for(var si=0;si<ex.sets;si++){var done=state.log[logKey(state.week,state.day,ei,si)];html+='<div class="set-row"><span class="set-label">Set '+(si+1)+'</span><input type="number" class="weight-input" value="'+curW+'" step="2.5" inputmode="decimal" onchange="updateWeight('+state.week+',\''+state.day+'\','+ei+',parseFloat(this.value))"><span class="kg-label">kg</span><span class="reps-display">\u00d7 '+ex.reps+'</span><button class="set-check '+(done?'done':'')+'" onclick="toggleSet('+state.week+',\''+state.day+'\','+ei+','+si+')">'+(done?'\u2713':'\u25cb')+'</button></div>';}html+='</div></div>';});
html+='<div class="section-title">Ski Erg Finisher</div>';
html+='<div class="cardio-box"><div class="exercise-name">Ski Erg</div><div class="cardio-detail">'+SKI_ERG[state.week]+'</div></div>';
html+='<button class="reset-btn" onclick="if(confirm(\'Reset ALL data? This cannot be undone.\')){localStorage.removeItem(\'ggt_state\');location.reload()}">Reset All Data</button>';
app.innerHTML=html;}
render();
</script></body></html>
